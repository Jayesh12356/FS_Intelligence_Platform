name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (pytest + ruff)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: fsp_user
          POSTGRES_PASSWORD: fsp_secret
          POSTGRES_DB: fsplatform_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U fsp_user -d fsplatform_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      ENVIRONMENT: ci
      DATABASE_URL: postgresql+asyncpg://fsp_user:fsp_secret@localhost:5432/fsplatform_test
      DATABASE_URL_SYNC: postgresql://fsp_user:fsp_secret@localhost:5432/fsplatform_test
      QDRANT_URL: http://localhost:6333
      LLM_PROVIDER: openai
      OPENAI_API_KEY: sk-test-ci-noop
      ANTHROPIC_API_KEY: test-noop
      PRIMARY_MODEL: gpt-4o-mini
      ORCHESTRATION_ENABLED: "false"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff==0.8.4

      - name: Lint (ruff)
        run: ruff check app tests --output-format=github

      - name: Run tests
        run: pytest -q --tb=short

  frontend:
    name: Frontend (lint + typecheck + build + vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci || npm install

      - name: Lint
        run: npm run lint --if-present

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests (vitest)
        run: npx vitest run --passWithNoTests

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: npm run build

  mcp_server:
    name: MCP server (registration tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp-server

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: mcp-server/requirements.txt

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest==8.3.4

      - name: Run registration tests
        env:
          BACKEND_URL: http://localhost:8000
        run: pytest -q tests
