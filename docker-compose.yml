services:
  postgres:
    image: postgres:16-alpine
    container_name: fsp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fsp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fsp_secret}
      POSTGRES_DB: ${POSTGRES_DB:-fsplatform}
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fsp_user} -d ${POSTGRES_DB:-fsplatform}"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: fsp_qdrant
    restart: unless-stopped
    ports:
      - "6336:6333"
      - "6337:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fsp_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-fsp_user}:${POSTGRES_PASSWORD:-fsp_secret}@postgres:5432/${POSTGRES_DB:-fsplatform}
      DATABASE_URL_SYNC: postgresql://${POSTGRES_USER:-fsp_user}:${POSTGRES_PASSWORD:-fsp_secret}@postgres:5432/${POSTGRES_DB:-fsplatform}
      QDRANT_URL: http://qdrant:6333
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - upload_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fsp_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3001:3001"
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - backend

volumes:
  postgres_data:
  qdrant_data:
  upload_data:
